name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    checks:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Sync dependencies
              run: uv sync --group dev

            - name: Run Ruff
              run: uv run ruff check .

            - name: Run pytest
              run: uv run pytest

            - name: Run mypy
              run: uv run mypy src main.py
